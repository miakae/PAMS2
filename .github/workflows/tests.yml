name: Widget Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libgl1 libxkbcommon-x11-0 libdbus-1-3
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run tests
      run: xvfb-run -a pytest test_widgets.py -v --tb=short

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results
        path: .pytest_cache
